<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ruleta de la Felicidad – Día de la Felicidad ITAM" />
  <title>Ruleta de la Felicidad · ITAM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============================================================
       CONFETI – contenedor para partículas generadas por JS
  ============================================================ -->
  <div id="confetti-container" aria-hidden="true"></div>

  <!-- ============================================================
       ENCABEZADO
  ============================================================ -->
  <header class="site-header">
    <p class="header-tag">✦ Día Internacional de la Felicidad</p>
    <h1 class="site-title">Ruleta de la <span class="title-accent">Felicidad</span></h1>
    <p class="site-subtitle">Gira y descubre tu reto del día</p>
  </header>

  <!-- ============================================================
       SECCIÓN PRINCIPAL: RULETA + MASCOTAS
  ============================================================ -->
  <main class="main-content">

    <!-- Fila que contiene mascota izquierda + ruleta + mascota derecha -->
    <div class="wheel-row">

      <!-- Mascota izquierda
           Coloca bit1.png en la misma carpeta que index.html.
           Si la imagen no existe, se oculta automáticamente. -->
      <div class="mascot mascot--left" aria-hidden="true">
        <img
          src="bit1.png"
          alt="Mascota b1t"
          class="mascot-img"
          onerror="this.style.display='none'"
        />
      </div>

      <!-- Ruleta -->
      <div class="wheel-wrapper" role="img" aria-label="Ruleta de retos">
        <div class="wheel-pointer" aria-hidden="true">▼</div>
        <canvas id="wheel-canvas" width="320" height="320"></canvas>
      </div>

      <!-- Mascota derecha
           Coloca bit2.png en la misma carpeta que index.html.
           Puede ser la misma imagen que bit1.png o una variante. -->
      <div class="mascot mascot--right" aria-hidden="true">
        <img
          src="bit2.png"
          alt="Mascota b1t"
          class="mascot-img"
          onerror="this.style.display='none'"
        />
      </div>

    </div><!-- /wheel-row -->

    <!-- Botón para girar -->
    <button
      id="spin-btn"
      class="spin-button"
      aria-label="Girar la ruleta"
      onclick="handleSpinClick()"
    >
      ¡Gira tu suerte!
    </button>

    <!-- =========================================================
         ZONA DE RESULTADO (oculta hasta que termina el giro)
    ========================================================== -->
    <section id="result-section" class="result-section hidden" aria-live="polite">

      <!-- Reto obtenido -->
      <div class="result-card">
        <p class="result-label">Tu reto de hoy</p>
        <p id="result-text" class="result-text"></p>
      </div>

      <!-- Tarjeta especial "Y recuerda..." -->
      <div class="remember-card">
        <p class="remember-eyebrow">Y recuerda…</p>
        <p id="remember-text" class="remember-text"></p>
      </div>

      <!-- Botón para volver a girar -->
      <button
        class="again-button"
        aria-label="Volver a girar la ruleta"
        onclick="resetForNewSpin()"
      >
        Girar de nuevo
      </button>

    </section>

  </main>

  <!-- ============================================================
       FOOTER
  ============================================================ -->
  <footer class="site-footer">
    <p>Hecho con cariño para alegrar el día en el campus &middot; B1T</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
