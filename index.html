<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ruleta de la felicidad – Día de la Felicidad en el campus de ingenierías" />
  <title>🎡 Ruleta de la Felicidad</title>

  <!-- Google Fonts: Nunito (cuerpo amigable) + Syne (display tech) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Syne:wght@700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============================================================
       CONFETI – contenedor para partículas generadas por JS
  ============================================================ -->
  <div id="confetti-container" aria-hidden="true"></div>

  <!-- ============================================================
       ENCABEZADO
  ============================================================ -->
  <header class="site-header">
    <p class="header-tag">✨ Día Internacional de la Felicidad</p>
    <h1 class="site-title">Ruleta de la<br /><span class="title-accent">Felicidad</span></h1>
    <p class="site-subtitle">Gira, cumple tu reto y contagia alegría por el campus 🚀</p>
  </header>

  <!-- ============================================================
       CONTADOR DE PERSONAS FELICES
  ============================================================ -->
  <section class="counter-section" aria-label="Contador de personas felices hoy">
    <div class="counter-card">
      <span class="counter-icon">😄</span>
      <div class="counter-text">
        <span id="counter-number" class="counter-number">0</span>
        <span class="counter-label">personas se han hecho felices<br />hoy en el campus</span>
      </div>
    </div>
  </section>

  <!-- ============================================================
       SECCIÓN PRINCIPAL: RULETA
  ============================================================ -->
  <main class="main-content">

    <!-- Contenedor de la ruleta con flecha indicadora -->
    <div class="wheel-wrapper" role="img" aria-label="Ruleta de retos">

      <!-- Flecha/marcador superior -->
      <div class="wheel-pointer" aria-hidden="true">▼</div>

      <!-- Canvas donde se dibuja la ruleta -->
      <canvas id="wheel-canvas" width="320" height="320"></canvas>

    </div>

    <!-- Botón para girar -->
    <button
      id="spin-btn"
      class="spin-button"
      aria-label="Girar la ruleta"
      onclick="handleSpinClick()"
    >
      <span class="spin-btn-icon">🎡</span> ¡Gira tu suerte!
    </button>

    <!-- =========================================================
         ZONA DE RESULTADO (oculta hasta que se completa el giro)
    ========================================================== -->
    <section id="result-section" class="result-section hidden" aria-live="polite">

      <!-- Reto obtenido -->
      <div class="result-card">
        <p class="result-label">Tu reto de hoy es…</p>
        <p id="result-text" class="result-text"></p>
      </div>

      <!-- Mensaje "Y recuerda..." con estilo especial -->
      <div class="remember-card">
        <p class="remember-eyebrow">💛 Y recuerda…</p>
        <p id="remember-text" class="remember-text"></p>
      </div>

      <!-- Botón para volver a girar -->
      <button
        class="again-button"
        aria-label="Volver a girar la ruleta"
        onclick="resetForNewSpin()"
      >
        🔄 Girar de nuevo
      </button>

    </section>

  </main>

  <!-- ============================================================
       FOOTER
  ============================================================ -->
  <footer class="site-footer">
    <p>Hecho con cariño para alegrar el día en el campus 💻❤️</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
